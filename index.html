<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cotizaciones B&B</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f0f2f5; color: #1a1a1a; }
#vista-form { display: block; }
#vista-preview { display: none; }
.app-header { background: linear-gradient(135deg, #1f3a5f, #2c5282); color: white; padding: 15px; text-align: center; position: sticky; top: 0; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
.app-header img { height: 60px; filter: brightness(0) invert(1); } /* Filtro para que el logo resalte en blanco si es necesario */
.container { max-width: 600px; margin: 0 auto; padding: 16px; }
.card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
.card h2 { margin: 0 0 14px; font-size: 15px; color: #1f3a5f; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.num { background: #1f3a5f; color: white; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 500; }
.field input, .field textarea, .field select { width: 100%; padding: 11px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; font-family: inherit; background: #fafbfc; -webkit-appearance: none; }
.field input:focus, .field textarea:focus, .field select:focus { outline: none; border-color: #1f3a5f; }
.field textarea { resize: vertical; min-height: 60px; }
.folio-box { background: #fff8e1; border: 2px solid #ffc107; border-radius: 12px; padding: 14px; margin-bottom: 14px; }
.folio-row { display: flex; align-items: center; background: white; border-radius: 8px; border: 1px solid #ffc107; overflow: hidden; }
.folio-prefix { padding: 10px 6px 10px 14px; font-size: 22px; font-weight: bold; color: #1f3a5f; }
.folio-input { flex: 1; border: none !important; background: transparent !important; padding: 10px 4px !important; font-size: 22px !important; font-weight: bold !important; color: #1f3a5f !important; }
.folio-btns { display: flex; gap: 6px; padding-right: 8px; }
.folio-btn { background: #1f3a5f; color: white; border: none; width: 36px; height: 36px; border-radius: 8px; font-size: 20px; }
.svc-item { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px; margin-bottom: 10px; position: relative; }
.svc-badge { position: absolute; top: -8px; left: 12px; background: #1f3a5f; color: white; padding: 2px 10px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.svc-del { position: absolute; top: 8px; right: 8px; background: #fee2e2; color: #b91c1c; border: none; width: 28px; height: 28px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; }
.add-btn { width: 100%; padding: 12px; background: #f0f4f8; color: #1f3a5f; border: 2px dashed #b8c5d3; border-radius: 10px; font-size: 14px; font-weight: 600; margin-top: 4px; }
.resumen { background: #f8fafc; border-radius: 10px; padding: 14px; }
.res-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
.res-total { font-weight: 700; font-size: 17px; color: #1f3a5f; border-top: 1px solid #cbd5e0; margin-top: 6px; padding-top: 8px; }
.btn-main { width: 100%; padding: 16px; background: linear-gradient(135deg, #1f3a5f, #2c5282); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; margin-top: 8px; box-shadow: 0 4px 12px rgba(31,58,95,0.3); }
.btn-sec { width: 100%; padding: 12px; background: white; color: #1f3a5f; border: 1px solid #1f3a5f; border-radius: 10px; font-size: 14px; margin-top: 8px; }

/* Estilos de la Cotización Final */
.cot-body { padding: 20px; max-width: 680px; margin: 0 auto; font-family: Arial, sans-serif; font-size: 13px; color: #222; }
.cot-hdr { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #1f3a5f; padding-bottom: 14px; margin-bottom: 10px; }
.cot-brand-img { height: 70px; width: auto; }
.cot-right { text-align: right; }
.cot-fecha { font-size: 11px; color: #666; }
.cot-folio { font-size: 26px; font-weight: bold; color: #1f3a5f; margin-top: 2px; }
.cot-tit { font-size: 24px; font-weight: bold; color: #111; margin: 15px 0 5px; text-transform: uppercase; }
.cot-sub { font-size: 14px; color: #444; margin-bottom: 20px; font-weight: 600; }
.cot-svc { margin-bottom: 10px; padding: 8px; border-bottom: 1px solid #eee; }
.cot-hr { border: none; border-top: 1px solid #bbb; margin: 18px 0; }
.cot-bot { display: flex; justify-content: space-between; gap: 20px; }
.cot-cond { flex: 1; font-size: 11px; color: #555; }
.cot-tots { min-width: 180px; text-align: right; }
.tf { font-weight: bold; font-size: 16px; border-top: 2px solid #1f3a5f; margin-top: 5px; }
</style>
</head>
<body>

<div id="vista-form">
  <div class="app-header">
    <img src="logo.png.jpg" alt="B&B Servicios Industriales">
  </div>
  <div class="container">
    <div class="folio-box">
      <label>📋 Folio de Cotización</label>
      <div class="folio-row">
        <span class="folio-prefix">#</span>
        <input type="number" id="folio" class="folio-input" value="8">
        <div class="folio-btns">
          <button class="folio-btn" onclick="cambiarFolio(-1)">−</button>
          <button class="folio-btn" onclick="cambiarFolio(1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <h2><span class="num">1</span> Datos del Cliente</h2>
      <div class="field"><label>Cliente</label><input type="text" id="cliente" placeholder="Nombre de la empresa"></div>
      <div class="field"><label>Concepto General</label><input type="text" id="concepto" placeholder="Ej: Mantenimiento Mecánico"></div>
      <div class="field"><label>Fecha</label><input type="date" id="fecha"></div>
    </div>

    <div id="svc-list"></div>
    <button class="add-btn" onclick="agregarSvc()">+ Agregar línea de servicio</button>

    <div class="card" style="margin-top:20px">
      <h2><span class="num">2</span> Totales</h2>
      <div class="resumen">
        <div class="res-row"><span>Subtotal</span><span id="r-sub">$0.00</span></div>
        <div class="res-row"><span>IVA (16%)</span><span id="r-iva">$0.00</span></div>
        <div class="res-row res-total"><span>TOTAL</span><span id="r-tot">$0.00</span></div>
      </div>
    </div>

    <button class="btn-main" onclick="generar()">📄 Generar Cotización</button>
  </div>
</div>

<div id="vista-preview">
  <div class="app-header" style="background: #2d3748;">
    <button onclick="volver()" style="background:none; border:1px solid white; color:white; border-radius:5px; padding:5px 10px; float:left;">← Volver</button>
    <span style="color:white; font-weight:bold;">Vista Previa</span>
  </div>
  <div id="cot-contenido" class="cot-body"></div>
  <div class="container">
    <button class="btn-main" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>
  </div>
</div>

<script>
let svcs = [];
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
  agregarSvc();
});

function cambiarFolio(d) {
  const el = document.getElementById('folio');
  el.value = Math.max(1, (parseInt(el.value)||0) + d);
}

function agregarSvc() { svcs.push({desc:'', precio:0}); renderSvcs(); }
function eliminarSvc(i) { if(svcs.length<=1)return; svcs.splice(i,1); renderSvcs(); }

function renderSvcs() {
  const c = document.getElementById('svc-list');
  c.innerHTML = '';
  svcs.forEach((s,i) => {
    const d = document.createElement('div');
    d.className = 'card svc-item';
    d.innerHTML = `<div class="svc-badge">Servicio ${i+1}</div>
      <button class="svc-del" onclick="eliminarSvc(${i})">&times;</button>
      <div class="field" style="margin-top:10px"><label>Descripción</label>
        <input type="text" value="${s.desc}" oninput="svcs[${i}].desc=this.value"></div>
      <div class="field"><label>Precio Unitario (MXN)</label>
        <input type="number" value="${s.precio||''}" oninput="svcs[${i}].precio=parseFloat(this.value)||0;actualizarTotales()"></div>`;
    c.appendChild(d);
  });
  actualizarTotales();
}

function actualizarTotales() {
  const sub = svcs.reduce((a,s)=>a+(s.precio||0),0);
  const iva = sub*0.16, tot = sub+iva;
  document.getElementById('r-sub').textContent = fmt(sub);
  document.getElementById('r-iva').textContent = fmt(iva);
  document.getElementById('r-tot').textContent = fmt(tot);
}

function fmt(n){ return '$'+n.toLocaleString('es-MX',{minimumFractionDigits:2}); }
function volver() { document.getElementById('vista-preview').style.display='none'; document.getElementById('vista-form').style.display='block'; }

function generar(){
  const cliente = document.getElementById('cliente').value.toUpperCase();
  const concepto = document.getElementById('concepto').value;
  const folio = String(document.getElementById('folio').value).padStart(3,'0');
  const fecha = document.getElementById('fecha').value;
  
  let sHTML = '';
  svcs.forEach((s,i) => {
    if(!s.desc) return;
    sHTML += `<div class="cot-svc"><b>${i+1}. ${s.desc}</b><br><span style="float:right;">${fmt(s.precio)}</span><br></div>`;
  });

  const sub = svcs.reduce((a,s)=>a+(s.precio||0),0);
  const iva = sub*0.16;
  const tot = sub+iva;

  const content = `
    <div class="cot-hdr">
      <img src="logo.png.jpg" class="cot-brand-img">
      <div class="cot-right">
        <div class="cot-fecha">Fecha: ${fecha}</div>
        <div class="cot-folio">COT-${folio}</div>
        <div style="font-size:10px; color:#666;">RFC: GAML950426CA8</div>
      </div>
    </div>
    <div class="cot-tit">${cliente}</div>
    <div class="cot-sub">${concepto}</div>
    ${sHTML}
    <div class="cot-hr"></div>
    <div class="cot-bot">
      <div class="cot-cond">
        <b>Condiciones:</b><br>
        • Vigencia: 30 días naturales.<br>
        • Tiempo de ejecución: 1-2 días hábiles.<br>
        • Precios sujetos a cambios sin previo aviso.
      </div>
      <div class="cot-tots">
        Subtotal: ${fmt(sub)}<br>
        IVA (16%): ${fmt(iva)}<br>
        <div class="tf">TOTAL: ${fmt(tot)}</div>
      </div>
    </div>
  `;

  document.getElementById('cot-contenido').innerHTML = content;
  document.getElementById('vista-form').style.display = 'none';
  document.getElementById('vista-preview').style.display = 'block';
}
</script>
</body>
</html>
